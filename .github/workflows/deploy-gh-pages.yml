name: Deploy Angular to User Root Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app for root domain
        run: npm run build -- --configuration production --base-href /

      - name: Detect build output directory
        id: paths
        run: |
          BUILD_DIR="$(find dist -type f -name index.html | head -n 1 | xargs dirname)"
          if [ -z "$BUILD_DIR" ]; then
            echo "No se encontro index.html dentro de dist"
            exit 1
          fi
          echo "build_dir=$BUILD_DIR" >> "$GITHUB_OUTPUT"
          echo "Build directory: $BUILD_DIR"

      - name: Add SPA fallback and nojekyll
        run: |
          cp "${{ steps.paths.outputs.build_dir }}/index.html" "${{ steps.paths.outputs.build_dir }}/404.html"
          touch "${{ steps.paths.outputs.build_dir }}/.nojekyll"

      - name: Deploy to user root repository
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.USER_PAGES_TOKEN }}
          repository-name: NicolasLuna12/NicolasLuna12.github.io
          branch: main
          folder: ${{ steps.paths.outputs.build_dir }}
          clean: true
          single-commit: true
