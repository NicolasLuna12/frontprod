name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app for Pages
        run: npm run build -- --configuration production --base-href /frontprod/

      - name: Detect build output directory
        id: paths
        run: |
          BUILD_DIR="$(find dist -type f -name index.html | head -n 1 | xargs dirname)"
          if [ -z "$BUILD_DIR" ]; then
            echo "No se encontro index.html dentro de dist"
            exit 1
          fi
          echo "build_dir=$BUILD_DIR" >> "$GITHUB_OUTPUT"
          echo "Build directory: $BUILD_DIR"

      - name: Add SPA fallback and nojekyll
        run: |
          cp "${{ steps.paths.outputs.build_dir }}/index.html" "${{ steps.paths.outputs.build_dir }}/404.html"
          touch "${{ steps.paths.outputs.build_dir }}/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.paths.outputs.build_dir }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
