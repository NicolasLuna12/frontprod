name: Deploy Angular to User Root Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app for root domain
        run: npm run build -- --configuration production --base-href /

      - name: Detect build output directory
        id: paths
        run: |
          BUILD_DIR="$(find dist -type f -name index.html | head -n 1 | xargs dirname)"
          if [ -z "$BUILD_DIR" ]; then
            echo "No se encontro index.html dentro de dist"
            exit 1
          fi
          echo "build_dir=$BUILD_DIR" >> "$GITHUB_OUTPUT"
          echo "Build directory: $BUILD_DIR"

      - name: Add SPA fallback and nojekyll
        run: |
          cp "${{ steps.paths.outputs.build_dir }}/index.html" "${{ steps.paths.outputs.build_dir }}/404.html"
          touch "${{ steps.paths.outputs.build_dir }}/.nojekyll"

      - name: Deploy to user root repository
        env:
          DEPLOY_TOKEN: ${{ secrets.USER_PAGES_TOKEN }}
        run: |
          set -e
          TARGET_REPO="https://x-access-token:${DEPLOY_TOKEN}@github.com/NicolasLuna12/NicolasLuna12.github.io.git"
          TMP_DIR="$(mktemp -d)"

          git clone "$TARGET_REPO" "$TMP_DIR"
          find "$TMP_DIR" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R "${{ steps.paths.outputs.build_dir }}/." "$TMP_DIR/"

          cd "$TMP_DIR"
          git checkout -B main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No hay cambios para desplegar"
            exit 0
          fi
          git commit -m "Deploy from frontprod"
          git push origin main
